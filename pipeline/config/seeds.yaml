# 种子关键词表 — Stage1 search.list 输入
# search.list 单价100 units。原18条种子（下表前18条）已经消耗过18次type=video
# 调用，结果缓存在 artifacts/seed_channels.json，不会重复消耗。2026-07-18 为了把
# 频道池从518扩到2000+（REFACTOR_PLAN.md §3.1），新增下面这27条种子词，且原18条
# 也会用 type=channel 模式重新查一遍——同一关键词，type=channel 和 type=video 两种
# 搜索模式在YouTube侧排出来的结果集不一样，两种都查能覆盖更多真实存在的频道，而不是
# 无意义的重复调用。是否要再扩大调用次数，由 collect.py 的 --extend-discovery-calls
# 参数控制，实际花销受 quota.py 的每日 units 硬顶（10000）兜底，不会读到这条注释就
# 误以为可以无限加关键词。
#
# vertical: 用于季节因子聚合与前端展示的垂类标签（中文），与频道后续打标一致。
