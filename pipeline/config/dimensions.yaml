# 八维语义空间定义 —— Stage3 (vision.py) 输出的 content_vector 与
# products.yaml 定义的单品卖点向量共享同一坐标系，顺序必须严格一致。
# 任何一方改动维度定义（新增/删除/重排）都必须同步更新另一方。
#
# 每个维度都写明 0.0 / 0.5 / 1.0 的评分锚点，直接喂给视觉模型的 prompt，
# 减少不同频道之间打分的主观漂移。

dimensions:
  - key: perspective_ratio
    index: 0
    name: "第一人称视角占比"
    description: "画面以第一人称/POV视角（含胸前、头戴、自拍杆延伸视角）拍摄的比例"
    anchors:
      0.0: "完全第三人称固定机位或手持跟拍，无POV镜头"
      0.5: "第一人称与第三人称镜头大致各半"
      1.0: "几乎全程第一人称POV视角，观众如同身临其境"

  - key: stabilization_demand
    index: 1
    name: "防抖需求强度"
    description: "画面运动幅度与抖动程度隐含的对硬件防抖能力的依赖程度"
    anchors:
      0.0: "画面几乎静止或极缓慢平移，无防抖需求"
      0.5: "有明显运动（步行、骑行慢速）但画面基本可看"
      1.0: "高速运动、剧烈震动（越野骑行颠簸、跳跃落地）中画面仍需保持稳定"

  - key: motion_complexity
    index: 2
    name: "运镜复杂度"
    description: "运镜手法的丰富程度：多角度切换、跟拍、环绕、无人机等复合运镜的使用程度"
    anchors:
      0.0: "单一固定机位，无运镜变化"
      0.5: "偶有角度切换或简单跟拍"
      1.0: "频繁多机位切换、环绕/跟拍/俯拍等复合运镜贯穿全片"

  - key: scene_extremity
    index: 3
    name: "场景极限度"
    description: "拍摄环境的极限/高风险程度：高速、高空、水下、恶劣天气等"
    anchors:
      0.0: "安全平缓的日常场景（室内、平地慢速）"
      0.5: "有一定风险的运动场景（普通雪道滑雪、公路骑行）"
      1.0: "高风险极限场景（悬崖速降、深海潜水、高速摩托越野）"

  - key: gear_visibility
    index: 4
    name: "装备可见度"
    description: "画面中运动装备/相机设备本身的展示程度（是否直接可见自拍杆、相机、护具等）"
    anchors:
      0.0: "画面中完全不出现任何装备或相机"
      0.5: "偶尔入镜运动装备（头盔、护具），无相机特写"
      1.0: "频繁展示装备细节，含相机/自拍杆本身的开箱、安装、特写镜头"

  - key: narrative_pace
    index: 5
    name: "叙事节奏"
    description: "剪辑快慢与信息密度：数值越高节奏越快（快切、密集信息），越低越舒缓（长镜头、慢节奏）"
    anchors:
      0.0: "长镜头为主，节奏舒缓，少剪辑点"
      0.5: "中等剪辑频率，叙事平稳推进"
      1.0: "快节奏剪辑，镜头切换密集，信息量大"

  - key: scene_diversity
    index: 6
    name: "场景多样性"
    description: "单条视频内场景/地点切换的丰富程度"
    anchors:
      0.0: "全程单一场景/地点"
      0.5: "2-3个不同场景的切换"
      1.0: "多个显著不同场景（室内外、多地点）频繁切换"

  - key: slow_motion_demand
    index: 7
    name: "子弹时间/慢动作需求"
    description: "视频中使用慢动作、高速摄影或环绕定格（子弹时间）效果的倾向程度"
    anchors:
      0.0: "全程正常速度，无慢动作或定格效果"
      0.5: "偶尔使用慢动作强调关键瞬间"
      1.0: "大量使用慢动作/子弹时间效果作为核心表现手法"
